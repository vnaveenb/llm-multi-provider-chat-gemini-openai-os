<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Provider Chat Core</title>
  <style>
    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --border:       #30363d;
      --text:         #c9d1d9;
      --muted:        #8b949e;
      --user-bg:      #1f6feb;
      --asst-bg:      #21262d;
      --accent:       #388bfd;
      --success:      #3fb950;
      --warning:      #d29922;
      --cache:        #58a6ff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
    .badge {
      font-size: 11px;
      font-family: monospace;
      padding: 3px 9px;
      border-radius: 12px;
    }
    .provider-badge {
      background: #0d2137;
      color: var(--accent);
      border: 1px solid #1f4070;
    }
    .session-area {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .session-id {
      font-family: monospace;
      cursor: pointer;
      color: var(--muted);
      transition: color .15s;
    }
    .session-id:hover { color: var(--text); }
    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

    /* ── Tabs ───────────────────────────────────────────────────────────── */
    .tabs {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex;
    }
    .tab {
      padding: 9px 16px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Messages ───────────────────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      pointer-events: none;
    }
    .empty .icon { font-size: 36px; }
    .empty p { font-size: 13px; }

    .msg { display: flex; flex-direction: column; max-width: 78%; }
    .msg.user  { align-self: flex-end;   align-items: flex-end; }
    .msg.asst  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.asst .bubble {
      background: var(--asst-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--text);
      border-radius: 1px;
      animation: blink .75s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .msg-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
      padding: 0 3px;
    }

    /* tool call / result cards */
    .tool-card {
      margin-top: 6px;
      background: var(--surface);
      border-left: 3px solid var(--warning);
      border-radius: 0 6px 6px 0;
      padding: 7px 11px;
      font-size: 12px;
      font-family: monospace;
      max-width: 460px;
      word-break: break-all;
    }
    .tool-card.result { border-left-color: var(--success); }
    .tool-label {
      font-weight: 700;
      margin-bottom: 3px;
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      letter-spacing: .3px;
    }
    .tool-card .tool-label { color: var(--warning); }
    .tool-card.result .tool-label { color: var(--success); }

    /* ── Input area ─────────────────────────────────────────────────────── */
    .input-area {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
    }
    .tools-row {
      display: none;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 10px;
    }
    .tools-row.visible { display: flex; }
    .tool-check {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .tool-check input { cursor: pointer; accent-color: var(--accent); }
    .tool-check:hover { color: var(--text); }

    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      outline: none;
      transition: border-color .15s;
      line-height: 1.5;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .btn-send {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-send:hover:not(:disabled) { background: #1c6ed6; }
    .btn-send:disabled { background: #2d333b; color: var(--muted); cursor: not-allowed; }

    .foot {
      display: flex;
      justify-content: space-between;
      margin-top: 7px;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── System prompt panel ────────────────────────────────────────────── */
    .sys-row { margin-bottom: 8px; }
    .sys-toggle {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sys-toggle:hover { color: var(--text); }
    .sys-arrow { font-size: 9px; transition: transform .15s; }
    .sys-arrow.open { transform: rotate(90deg); }
    .sys-editor { display: none; margin-top: 6px; }
    .sys-editor.visible { display: block; }
    .sys-editor textarea {
      width: 100%;
      font-size: 12px;
      color: var(--muted);
      border-color: var(--border);
      min-height: 56px;
      max-height: 180px;
    }
    .sys-editor textarea:focus { border-color: var(--cache); color: var(--text); }
    .sys-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .cache-tip {
      font-size: 10px;
      background: #0d1e3a;
      color: var(--cache);
      border: 1px solid #1a3a6e;
      padding: 1px 7px;
      border-radius: 10px;
    }

    /* ── Streaming cursor (CSS-based so it works inside nested MD elements) */
    .bubble.streaming::after {
      content: '';
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--text);
      border-radius: 1px;
      animation: blink .75s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
    }

    /* ── Markdown rendered in bubbles ───────────────────────────────────── */
    .bubble h1, .bubble h2, .bubble h3 { margin: 8px 0 4px; font-weight: 600; line-height: 1.3; }
    .bubble h1 { font-size: 1.2em; }
    .bubble h2 { font-size: 1.1em; }
    .bubble h3 { font-size: 1em; }
    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin: 4px 0 8px 20px; }
    .bubble li { margin: 2px 0; }
    .bubble code {
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 0.88em;
    }
    .bubble pre {
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .bubble pre code { background: none; padding: 0; font-size: 12px; }
    .bubble blockquote {
      border-left: 3px solid var(--border);
      margin: 6px 0;
      padding: 4px 12px;
      color: var(--muted);
    }
    .bubble strong { font-weight: 600; }
    .bubble a { color: var(--accent); text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

    /* ── Cache hit badge ────────────────────────────────────────────────── */
    .cache-badge {
      font-size: 10px;
      background: #0a2516;
      color: var(--success);
      border: 1px solid #1a5e35;
      padding: 1px 6px;
      border-radius: 10px;
      font-family: monospace;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <span style="font-size:20px;line-height:1">🤖</span>
  <h1>Multi-Provider Chat Core</h1>
  <span class="badge provider-badge" id="providerBadge">…</span>
  <div class="session-area">
    <span>Session:</span>
    <span class="session-id" id="sessionDisplay" title="Click to copy" onclick="copySession()">—</span>
    <button class="btn-ghost" onclick="newSession()">New</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="setMode('chat')">💬 Chat</button>
  <button class="tab"        onclick="setMode('stream')">⚡ Stream</button>
  <button class="tab"        onclick="setMode('tools')">🔧 Tools</button>
</div>

<div class="messages" id="messages">
  <div class="empty" id="empty">
    <div class="icon">💬</div>
    <p>Send a message to start chatting</p>
  </div>
</div>

<div class="input-area">
  <div class="sys-row" id="sysRow">
    <button class="sys-toggle" onclick="toggleSysPrompt()">
      <span class="sys-arrow" id="sysArrow">▶</span>
      System Prompt
      <span class="cache-tip">implicit caching on Gemini 2.5+</span>
    </button>
    <div class="sys-editor" id="sysEditor">
      <textarea id="sysInput"
        placeholder="You are a helpful, concise AI assistant."
        rows="3"
        oninput="resize(this)"></textarea>
      <div class="sys-hint">
        Gemini 2.5 automatically caches repeated prompt prefixes ≥1024 tokens — a rich system prompt here reduces cost on subsequent turns.
      </div>
    </div>
  </div>
  <div class="tools-row" id="toolsRow">
    <label class="tool-check"><input type="checkbox" value="get_current_time" checked> 🕐 get_current_time</label>
    <label class="tool-check"><input type="checkbox" value="calculate"        checked> 🧮 calculate</label>
  </div>
  <div class="input-row">
    <textarea id="msgInput"
      placeholder="Type a message… (Enter to send, Shift+Enter for new line)"
      rows="1"
      onkeydown="onKey(event)"
      oninput="resize(this)"></textarea>
    <button class="btn-send" id="sendBtn" onclick="send()">Send ▶</button>
  </div>
  <div class="foot">
    <span id="modeHint">Mode: Chat — waits for full response</span>
    <span id="tokenDisplay">Tokens: —</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.5/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module">
  import * as smd from 'https://cdn.jsdelivr.net/npm/streaming-markdown/smd.js';
  window.smd = smd;
</script>
<script>
  marked.use({ gfm: true, breaks: true });

  // ── State ──────────────────────────────────────────────────────────────────
  const DEFAULT_SYSTEM = 'You are a helpful, concise AI assistant.';
  const HINTS = {
    chat:   'Mode: Chat — waits for full response',
    stream: 'Mode: Stream — tokens arrive in real time ⚡',
    tools:  'Mode: Tools — LLM can call server-side functions 🔧',
  };

  let mode = 'chat';
  let sessionId = uuid();
  let busy = false;
  let totalIn = 0, totalOut = 0, totalCached = 0;

  // ── Boot ───────────────────────────────────────────────────────────────────
  refreshSessionDisplay();
  loadProvider();

  async function loadProvider() {
    try {
      const d = await fetch('/health').then(r => r.json());
      document.getElementById('providerBadge').textContent = d.provider;
    } catch { document.getElementById('providerBadge').textContent = 'offline'; }
  }

  // ── Mode ───────────────────────────────────────────────────────────────────
  function setMode(m) {
    mode = m;
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', ['chat','stream','tools'][i] === m));
    document.getElementById('toolsRow').classList.toggle('visible', m === 'tools');
    document.getElementById('modeHint').textContent = HINTS[m];
  }

  // ── Session ────────────────────────────────────────────────────────────────
  function uuid() {
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c/4).toString(16));
  }
  function refreshSessionDisplay() {
    document.getElementById('sessionDisplay').textContent = sessionId.slice(0,8)+'…';
  }
  function newSession() {
    sessionId = uuid();
    refreshSessionDisplay();
    document.getElementById('messages').innerHTML =
      '<div class="empty"><div class="icon">🔄</div><p>New session started</p></div>';
    totalIn = 0; totalOut = 0; totalCached = 0;
    document.getElementById('tokenDisplay').textContent = 'Tokens: —';
  }
  function copySession() {
    navigator.clipboard?.writeText(sessionId);
    const el = document.getElementById('sessionDisplay');
    el.textContent = 'copied!';
    setTimeout(refreshSessionDisplay, 1200);
  }

  // ── System prompt ──────────────────────────────────────────────────────────
  function getSystemPrompt() {
    return document.getElementById('sysInput').value.trim() || DEFAULT_SYSTEM;
  }
  function toggleSysPrompt() {
    const editor = document.getElementById('sysEditor');
    const arrow  = document.getElementById('sysArrow');
    const open   = editor.classList.toggle('visible');
    arrow.classList.toggle('open', open);
  }

  // ── Input helpers ──────────────────────────────────────────────────────────
  function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
  function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  // ── DOM helpers ────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function clearEmpty() {
    document.getElementById('empty')?.remove();
  }
  function scroll() {
    const el = document.getElementById('messages');
    el.scrollTop = el.scrollHeight;
  }
  function appendUserMsg(text) {
    clearEmpty();
    const d = document.createElement('div');
    d.className = 'msg user';
    d.innerHTML = `<div class="bubble">${esc(text)}</div>`;
    document.getElementById('messages').appendChild(d);
    scroll();
  }
  function appendAsstShell() {
    clearEmpty();
    const wrap = document.createElement('div');
    wrap.className = 'msg asst';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    wrap.appendChild(bubble);
    document.getElementById('messages').appendChild(wrap);
    scroll();
    return { wrap, bubble };
  }
  function appendToolCard(label, body, isResult) {
    const c = document.createElement('div');
    c.className = 'tool-card' + (isResult ? ' result' : '');
    c.innerHTML = `<div class="tool-label">${esc(label)}</div><pre style="white-space:pre-wrap;font-size:12px">${esc(body)}</pre>`;
    return c;
  }
  function updateTokens(tok) {
    if (!tok) return;
    totalIn     += tok.input   || 0;
    totalOut    += tok.output  || 0;
    totalCached += tok.cached  || 0;
    let label = `Tokens: ${totalIn} in / ${totalOut} out`;
    if (totalCached > 0) label += ` · ${totalCached} cached`;
    document.getElementById('tokenDisplay').textContent = label;
  }
  function cacheBadge(tok) {
    return (tok && tok.cached > 0)
      ? `<span class="cache-badge">💾 ${tok.cached} cached</span>`
      : '';
  }

  // ── Send dispatcher ────────────────────────────────────────────────────────
  async function send() {
    const el = document.getElementById('msgInput');
    const msg = el.value.trim();
    if (!msg || busy) return;

    busy = true;
    document.getElementById('sendBtn').disabled = true;
    el.value = ''; el.style.height = 'auto';
    appendUserMsg(msg);

    try {
      if      (mode === 'chat')   await doChat(msg);
      else if (mode === 'stream') await doStream(msg);
      else                        await doTools(msg);
    } catch (err) {
      const { bubble } = appendAsstShell();
      bubble.style.color = '#f85149';
      bubble.textContent = '⚠ ' + err.message;
    } finally {
      busy = false;
      document.getElementById('sendBtn').disabled = false;
      el.focus();
    }
  }

  // ── Chat (sync) ────────────────────────────────────────────────────────────
  async function doChat(msg) {
    const { wrap, bubble } = appendAsstShell();
    const cur = document.createElement('span');
    cur.className = 'cursor';
    bubble.appendChild(cur);

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: msg, system_prompt: getSystemPrompt() }),
    });
    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
    const data = await res.json();

    cur.remove();
    const clean = DOMPurify.sanitize(marked.parse(data.answer));
    if (DOMPurify.removed.length) {
      bubble.innerHTML = '<em style="color:var(--warning)">⚠ Unsafe content detected — rendering stopped.</em>';
    } else {
      bubble.innerHTML = clean;
    }

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.innerHTML = `${esc(data.model)} ${cacheBadge(data.tokens)}`;
    wrap.appendChild(meta);
    updateTokens(data.tokens);
    scroll();
  }

  // ── Stream ─────────────────────────────────────────────────────────────────
  async function doStream(msg) {
    const { wrap, bubble } = appendAsstShell();
    // CSS ::after cursor — safe inside nested Markdown DOM nodes
    bubble.classList.add('streaming');

    const res = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: msg, system_prompt: getSystemPrompt() }),
    });
    if (!res.ok) throw new Error(res.statusText);

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '', chunks = '';
    // streaming-markdown writes directly into `bubble` via appendChild —
    // avoids the innerHTML re-parse cost of the naive approach.
    const parser = smd.parser(smd.default_renderer(bubble));
    let stopped = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });

      const parts = buf.split('\n\n');
      buf = parts.pop(); // keep incomplete tail

      for (const part of parts) {
        if (stopped) break;
        if (!part.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(part.slice(6)); } catch { continue; }

        if (ev.token !== undefined) {
          // Sanitize the full accumulated text before rendering each chunk.
          // Dangerous content (e.g. injected <script>/<img onerror>) is
          // detected here; a non-zero removed.length means stop immediately.
          chunks += ev.token;
          DOMPurify.sanitize(chunks);
          if (DOMPurify.removed.length) {
            smd.parser_end(parser);
            stopped = true;
            bubble.classList.remove('streaming');
            bubble.innerHTML = '<em style="color:var(--warning)">⚠ Unsafe content detected — rendering stopped.</em>';
            break;
          }
          // Write only this chunk; streaming-markdown uses append() internally
          // so the browser re-renders only the new content, not the whole bubble.
          smd.parser_write(parser, ev.token);
          scroll();
        }
        if (ev.done) {
          smd.parser_end(parser);
          bubble.classList.remove('streaming');
          const meta = document.createElement('div');
          meta.className = 'msg-meta';
          meta.innerHTML = `⚡ streamed ${cacheBadge(ev.tokens)}`;
          wrap.appendChild(meta);
          updateTokens(ev.tokens);
          scroll();
        }
      }
    }
  }

  // ── Tools ──────────────────────────────────────────────────────────────────
  async function doTools(msg) {
    const tools = [...document.querySelectorAll('#toolsRow input:checked')].map(el => el.value);
    if (!tools.length) throw new Error('Select at least one tool above');

    const { wrap, bubble } = appendAsstShell();
    const cur = document.createElement('span');
    cur.className = 'cursor';
    bubble.appendChild(cur);

    const res = await fetch('/tools', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: msg, tools, system_prompt: getSystemPrompt() }),
    });
    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
    const data = await res.json();

    cur.remove();
    const clean = DOMPurify.sanitize(marked.parse(data.answer));
    if (DOMPurify.removed.length) {
      bubble.innerHTML = '<em style="color:var(--warning)">⚠ Unsafe content detected — rendering stopped.</em>';
    } else {
      bubble.innerHTML = clean;
    }

    for (const tc of data.tool_calls)
      wrap.appendChild(appendToolCard(`🔧 called: ${tc.name}`, JSON.stringify(tc.args, null, 2), false));
    for (const tr of data.tool_results)
      wrap.appendChild(appendToolCard(`✅ result: ${tr.name}`, tr.result, true));

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.innerHTML = `${esc(data.model)} · ${data.tool_calls.length} tool call(s) ${cacheBadge(data.tokens)}`;
    wrap.appendChild(meta);
    updateTokens(data.tokens);
    scroll();
  }
</script>
</body>
</html>
